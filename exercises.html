<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music exercises</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(100%, 56rem);
        padding: clamp(1.5rem, 5vw, 3rem);
        border: 1px solid #e2e8f0;
        background: #fff;
        box-shadow: 0 20px 45px rgb(15 23 42 / 8%);
      }

      h1 { margin: 0; font-size: clamp(1.5rem, 5vw, 2rem); }
      p { color: #475569; }

      .exercise-toggle {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: .25rem;
        margin-top: 1.5rem;
        padding: .25rem;
        background: #e2e8f0;
      }

      .exercise-toggle button { background: transparent; color: #475569; }
      .exercise-toggle button:hover { background: #cbd5e1; }
      .exercise-toggle button.active { background: #fff; color: #0f766e; box-shadow: 0 1px 3px rgb(15 23 42 / 15%); }

      .mode {
        margin: 2.25rem 0 .5rem;
        color: #0f766e;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-align: center;
        text-transform: uppercase;
      }

      .progress {
        margin: 0 0 1rem;
        color: #64748b;
        font-size: .95rem;
        text-align: center;
      }

      .progress-indicator {
        display: none;
        margin: 0 0 1.5rem;
      }

      .progress-indicator.visible {
        display: block;
      }

      .progress-track {
        overflow: hidden;
        height: .65rem;
        border: 1px solid #cbd5e1;
        background: #e2e8f0;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0f766e, #14b8a6);
        transition: width .2s ease;
      }

      .progress-detail {
        margin: .5rem 0 0;
        color: #64748b;
        font-size: .85rem;
        text-align: center;
      }

      .chord-drill-next {
        display: none;
      }

      .key-picker {
        display: none;
        margin: 1rem 0 1.25rem;
      }

      .key-picker.visible {
        display: block;
      }

      .key-picker label {
        margin-bottom: .35rem;
        text-align: center;
      }

      .key-picker select {
        width: 100%;
        padding: .75rem .9rem;
        border: 1px solid #cbd5e1;
        font: inherit;
        background: #fff;
      }

      .chord-drill-settings {
        display: none;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: .75rem;
        margin: 1rem 0 1.25rem;
        padding: 1rem;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
      }

      .chord-drill-settings.visible { display: grid; }

      .chord-drill-settings label { margin: 0; }

      .chord-drill-settings input {
        display: block;
        width: 100%;
        margin-top: .35rem;
      }

      .chord-drill-settings button {
        grid-column: 1 / -1;
      }

      .chord-drill-direction {
        display: flex;
        flex-direction: column;
        gap: .35rem;
      }

      .chord-drill-direction span {
        font-weight: 650;
      }

      .interval-picker {
        display: none;
        margin: 1rem 0 1.25rem;
        padding: 1rem;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
      }

      .interval-picker.visible {
        display: block;
      }

      .interval-picker-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: .85rem;
        flex-wrap: wrap;
      }

      .interval-picker-header p {
        margin: 0;
        color: #0f172a;
        font-weight: 650;
      }

      .interval-picker-actions {
        display: flex;
        gap: .5rem;
      }

      .interval-picker-actions button {
        padding: .45rem .7rem;
        background: #e2e8f0;
        color: #0f172a;
        font-size: .9rem;
      }

      .interval-picker-actions button:hover {
        background: #cbd5e1;
      }

      .interval-prompt-style {
        display: flex;
        align-items: center;
        gap: .5rem;
        color: #0f172a;
        font-weight: 500;
      }

      .interval-prompt-style select {
        padding: .45rem .7rem;
        border: 1px solid #cbd5e1;
        font: inherit;
        background: #fff;
      }

      .interval-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
        gap: .5rem .75rem;
      }

      .interval-option {
        display: flex;
        align-items: center;
        gap: .55rem;
        margin: 0;
        color: #0f172a;
        font-weight: 500;
      }

      .interval-option input {
        flex: 0 0 auto;
        width: 1rem;
        height: 1rem;
      }

      .progress-chords {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(6.5rem, 1fr));
        gap: .5rem;
        margin-top: .75rem;
      }

      .progress-chord {
        padding: .45rem .5rem;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        text-align: center;
      }

      .progress-chord.mastered {
        border-color: #0f766e;
        background: #ecfeff;
      }

      .progress-chord-name {
        display: block;
        color: #0f172a;
        font-size: .82rem;
        font-weight: 700;
      }

      .progress-chord-time {
        display: block;
        margin-top: .15rem;
        color: #64748b;
        font-size: .78rem;
      }

      .degrees {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        min-height: 8rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.5rem, 14vw, 6rem);
        line-height: 1;
      }

      .degrees.note-question { font-size: clamp(1.75rem, 8vw, 3.5rem); }
      .degrees.compact-question { font-size: clamp(1.2rem, 5vw, 2.4rem); }

      .notation-card {
        min-height: 15rem;
        margin-top: 1rem;
        border: 1px solid #cbd5e1;
        background: #fffdf8;
      }

      .notation-card.incorrect-reveal {
        border-color: #b91c1c;
        box-shadow: 0 0 0 3px rgb(185 28 28 / 16%);
      }

      .notation-card.hidden {
        display: grid;
        place-items: center;
        color: #64748b;
        font-size: 1rem;
        font-weight: 650;
      }

      .arrow { color: #94a3b8; font-family: inherit; font-size: .55em; }

      form { margin-top: 2rem; }

      label { display: block; margin-bottom: .5rem; font-weight: 650; }

      .answer-row { display: flex; gap: .75rem; }

      input {
        min-width: 0;
        flex: 1;
        padding: .8rem .9rem;
        border: 1px solid #cbd5e1;
        font: inherit;
      }

      input:focus { outline: 3px solid rgb(13 148 136 / 20%); border-color: #0f766e; }

      button {
        padding: .8rem 1.1rem;
        border: 0;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:hover { background: #115e59; }
      button.secondary { width: 100%; margin-top: .75rem; background: #e2e8f0; color: #0f172a; }
      button.secondary:hover { background: #cbd5e1; }

      .feedback { min-height: 1.5rem; margin: .9rem 0 0; font-weight: 650; }
      .feedback.correct { color: #15803d; }
      .feedback.incorrect { color: #b91c1c; }

      .hint { margin-bottom: 0; font-size: .85rem; }

      @media (max-width: 30rem) {
        .exercise-toggle { grid-template-columns: 1fr; }
        .answer-row { flex-direction: column; }
        .answer-row button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Scale degree intervals</h1>
      <p id="instructions">Name the ascending interval from the first scale degree to the second.</p>

      <div class="exercise-toggle" role="group" aria-label="Exercise type">
        <button class="active" id="intervalMode" type="button" aria-pressed="true">Intervals</button>
        <button id="noteMode" type="button" aria-pressed="false">Name the note</button>
        <button id="signatureMode" type="button" aria-pressed="false">Key signatures</button>
        <button id="chordMode" type="button" aria-pressed="false">Chords</button>
        <button id="pianoDegreeMode" type="button" aria-pressed="false">Piano degrees</button>
        <button id="chordDrillMode" type="button" aria-pressed="false">Chord drill</button>
      </div>

      <div class="key-picker" id="chordKeyPicker">
        <label for="chordKeySelect">Chord key</label>
        <select id="chordKeySelect" name="chordKey"></select>
      </div>
      <div class="key-picker" id="pianoDegreeKeyPicker">
        <label for="pianoDegreeKeySelect">Piano degree key</label>
        <select id="pianoDegreeKeySelect" name="pianoDegreeKey"></select>
      </div>
      <div class="chord-drill-settings" id="chordDrillSettings">
        <label for="chordDrillChordSeconds">
          Chord duration (seconds)
          <input id="chordDrillChordSeconds" type="number" min="1" max="60" step="1" value="3">
        </label>
        <label for="chordDrillKeySeconds">
          Key duration (seconds)
          <input id="chordDrillKeySeconds" type="number" min="1" max="3600" step="1" value="30">
        </label>
        <div class="chord-drill-direction">
          <span id="chordDrillDirectionLabel">Key direction</span>
          <button id="chordDrillDirectionToggle" type="button" aria-pressed="false">Circle of fourths</button>
        </div>
        <button id="chordDrillToggle" type="button">Start drill</button>
      </div>
      <div class="interval-picker" id="intervalPicker">
        <div class="interval-picker-header">
          <p>Intervals to include</p>
          <label class="interval-prompt-style" for="intervalPromptStyle">
            <span>Prompt style</span>
            <select id="intervalPromptStyle" name="intervalPromptStyle">
              <option value="exact">Exact quality</option>
              <option value="basic">Basic number</option>
            </select>
          </label>
          <div class="interval-picker-actions">
            <button id="selectAllIntervals" type="button">Select all</button>
            <button id="clearIntervals" type="button">Up to octave</button>
          </div>
        </div>
        <div class="interval-grid" id="intervalOptions"></div>
      </div>

      <div class="mode" id="mode"></div>
      <p class="progress" id="progress"></p>
      <div class="progress-indicator" id="progressIndicator" aria-hidden="true">
        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-detail" id="progressDetail"></p>
        <p class="chord-drill-next" id="chordDrillNext" aria-live="polite"></p>
        <div class="progress-chords" id="progressChords"></div>
      </div>
      <div class="degrees" aria-live="polite">
        <span id="firstDegree"></span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
        <span id="secondDegree"></span>
      </div>
      <div class="notation-card" id="notationCard" hidden aria-live="polite"></div>

      <form id="answerForm" autocomplete="off">
        <label for="answer" id="answerLabel">Interval</label>
        <div class="answer-row">
          <input id="answer" name="answer" placeholder="e.g. major third or M3" required autofocus>
          <button type="submit">Check answer</button>
        </div>
        <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
        <button class="secondary" id="nextQuestion" type="button">New question</button>
      </form>

      <p class="hint" id="hint">Natural minor is used. Answers may be entered as names or shorthand, such as "perfect fifth" or "P5".</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow-core.js"></script>
    <script src="vendor/svg.min.js"></script>
    <script src="vendor/piano-chart.umd.js"></script>
    <script src="notation.js"></script>
    <script>
      const scales = {
        major: {
          label: "Major scale",
          degrees: ["I", "ii", "iii", "IV", "V", "vi", "vii°"],
          semitones: [0, 2, 4, 5, 7, 9, 11]
        },
        minor: {
          label: "Natural minor scale",
          degrees: ["i", "ii°", "III", "iv", "v", "VI", "VII"],
          semitones: [0, 2, 3, 5, 7, 8, 10]
        }
      };

      const intervalOptions = [
        { id: "P1", short: "P1", label: "Perfect unison", number: 1, semitones: 0 },
        { id: "m2", short: "m2", label: "Minor 2nd", number: 2, semitones: 1 },
        { id: "M2", short: "M2", label: "Major 2nd", number: 2, semitones: 2 },

        { id: "P4", short: "P4", label: "Perfect 4th", number: 4, semitones: 5 },
        { id: "A4", short: "A4", label: "Augmented 4th", number: 4, semitones: 6 },
        { id: "d5", short: "d5", label: "Diminished 5th", number: 5, semitones: 6 },

        { id: "P12", short: "P12", label: "Perfect 12th", number: 12, semitones: 19 },

        { id: "M13", short: "M13", label: "Major 13th", number: 13, semitones: 21 },

        { id: "M14", short: "M14", label: "Major 14th", number: 14, semitones: 23 },
        { id: "P15", short: "P15", label: "Perfect double octave", number: 15, semitones: 24 }
      ];
      const INTERVAL_STORAGE_KEY = "musicapp.intervalSelection.v1";
      const INTERVAL_PROMPT_STYLE_STORAGE_KEY = "musicapp.intervalPromptStyle.v1";
      const INTERVAL_ROOTS = ["C", "D", "E", "F", "G", "A", "B", "C#", "D#", "F#", "G#", "A#", "Db", "Eb", "Gb", "Ab", "Bb"];
      const NATURAL_INTERVAL_ROOTS = ["C", "D", "E", "F", "G", "A", "B"];

      const keys = {
        major: [
          ["C", ["C", "D", "E", "F", "G", "A", "B"]],
          ["G", ["G", "A", "B", "C", "D", "E", "F#"]],
          ["D", ["D", "E", "F#", "G", "A", "B", "C#"]],
          ["A", ["A", "B", "C#", "D", "E", "F#", "G#"]],
          ["E", ["E", "F#", "G#", "A", "B", "C#", "D#"]],
          ["F", ["F", "G", "A", "Bb", "C", "D", "E"]],
          ["Bb", ["Bb", "C", "D", "Eb", "F", "G", "A"]],
          ["Eb", ["Eb", "F", "G", "Ab", "Bb", "C", "D"]]
        ],
        minor: [
          ["A", ["A", "B", "C", "D", "E", "F", "G"]],
          ["E", ["E", "F#", "G", "A", "B", "C", "D"]],
          ["B", ["B", "C#", "D", "E", "F#", "G", "A"]],
          ["F#", ["F#", "G#", "A", "B", "C#", "D", "E"]],
          ["C#", ["C#", "D#", "E", "F#", "G#", "A", "B"]],
          ["D", ["D", "E", "F", "G", "A", "Bb", "C"]],
          ["G", ["G", "A", "Bb", "C", "D", "Eb", "F"]],
          ["C", ["C", "D", "Eb", "F", "G", "Ab", "Bb"]]
        ]
      };

      const keySignatures = [
        ["G major", "1s"], ["D major", "2s"], ["A major", "3s"],
        ["E major", "4s"], ["B major", "5s"], ["F# major", "6s"],
        ["C# major", "7s"], ["F major", "1b"], ["Bb major", "2b"],
        ["Eb major", "3b"], ["Ab major", "4b"], ["Db major", "5b"],
        ["Gb major", "6b"], ["Cb major", "7b"],
        ["E minor", "1s"], ["B minor", "2s"], ["F# minor", "3s"],
        ["C# minor", "4s"], ["G# minor", "5s"], ["D# minor", "6s"],
        ["A# minor", "7s"], ["D minor", "1b"], ["G minor", "2b"],
        ["C minor", "3b"], ["F minor", "4b"], ["Bb minor", "5b"],
        ["Eb minor", "6b"], ["Ab minor", "7b"]
      ];
      const majorPianoDegreeKeys = [
        ["C", ["C", "D", "E", "F", "G", "A", "B"]],
        ["G", ["G", "A", "B", "C", "D", "E", "F#"]],
        ["D", ["D", "E", "F#", "G", "A", "B", "C#"]],
        ["A", ["A", "B", "C#", "D", "E", "F#", "G#"]],
        ["E", ["E", "F#", "G#", "A", "B", "C#", "D#"]],
        ["B", ["B", "C#", "D#", "E", "F#", "G#", "A#"]],
        ["F#", ["F#", "G#", "A#", "B", "C#", "D#", "E#"]],
        ["Db", ["Db", "Eb", "F", "Gb", "Ab", "Bb", "C"]],
        ["Ab", ["Ab", "Bb", "C", "Db", "Eb", "F", "G"]],
        ["Eb", ["Eb", "F", "G", "Ab", "Bb", "C", "D"]],
        ["Bb", ["Bb", "C", "D", "Eb", "F", "G", "A"]],
        ["F", ["F", "G", "A", "Bb", "C", "D", "E"]]
      ];
      const chordDrillKeyScales = new Map(majorPianoDegreeKeys);
      chordDrillKeyScales.set("Gb", ["Gb", "Ab", "Bb", "Cb", "Db", "Eb", "F"]);
      const scaleDegreeAnswerMap = {
        1: ["1", "i", "do", "tonic"],
        2: ["2", "ii", "re", "supertonic"],
        3: ["3", "iii", "mi", "mediant"],
        4: ["4", "iv", "fa", "subdominant"],
        5: ["5", "v", "sol", "so", "dominant"],
        6: ["6", "vi", "la", "submediant"],
        7: ["7", "vii", "ti", "si", "leading tone", "leading note"]
      };
      const pianoDegreePromptOptions = [
        { id: "piano-to-degree", label: "Piano to scale degree" },
        { id: "staff-to-degree", label: "Sheet music to scale degree" },
        { id: "note-to-degree", label: "Note to scale degree" },
        { id: "degree-to-note", label: "Scale degree to note" }
      ];
      const NOTE_LETTER_INDEX = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
      const PIANO_DEGREE_STAFF_RANGES = {
        treble: {
          min: { letter: "F", octave: 3 },
          max: { letter: "E", octave: 6 }
        },
        bass: {
          min: { letter: "A", octave: 1 },
          max: { letter: "G", octave: 4 }
        }
      };
      const PIANO_DEGREE_QUESTIONS_PER_KEY = 100;

      const CHORD_LETTERS = ["C", "D", "E", "F", "G", "A", "B"];
      const CHORD_NATURAL_SEMITONES = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
      const CHROMATIC_ROOTS_SHARP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const CHROMATIC_ROOTS_FLAT = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
      const chordQualities = [
        { suffix: "M", intervals: [0, 4, 7] },
        { suffix: "m", intervals: [0, 3, 7] },
        { suffix: "7", intervals: [0, 4, 7, 10] },
        { suffix: "M7", intervals: [0, 4, 7, 11] },
        { suffix: "m7", intervals: [0, 3, 7, 10] },
        { suffix: "m7b5", intervals: [0, 3, 6, 10] },
        { suffix: "aug", intervals: [0, 4, 8] },
        { suffix: "dim", intervals: [0, 3, 6] }
      ];
      const chordDisplaySuffixMap = {
        M: "m",
        m: "i",
        M7: "m7",
        m7: "i7",
        m7b5: "i7b5"
      };
      const chordQualityBySuffix = Object.fromEntries(chordQualities.map((quality) => [quality.suffix, quality]));
      const chordKeyOptions = keys.major.map(([tonic, scaleNotes]) => ({
        id: `major:${tonic}`,
        tonic,
        scaleNotes,
        label: `${tonic} major`,
        accidentalPreference: tonic.includes("b") || tonic === "F" || tonic === "C" ? "flat" : "sharp"
      }));
      const CHORD_DRILL_CIRCLE_OF_FOURTHS = ["C", "F", "Bb", "Eb", "Ab", "Db", "Gb", "B", "E", "A", "D", "G"];
      const CHORD_DRILL_CIRCLE_OF_FIFTHS = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
      const CHORD_DRILL_KEY_SEQUENCES = {
        fourths: CHORD_DRILL_CIRCLE_OF_FOURTHS,
        fifths: CHORD_DRILL_CIRCLE_OF_FIFTHS
      };
      function buildChordDrillKeyOptions(sequence) {
        return sequence.map((tonic) => {
          const scaleNotes = chordDrillKeyScales.get(tonic) || [];
          return {
            id: `major:${tonic}`,
            tonic,

      function chordDrillItemsForKey(key) {

      function chordDrillDurationMs(input, fallback, maximum) {
        const seconds = Number(input.value);
        const safeSeconds = Number.isFinite(seconds)
          ? Math.min(maximum, Math.max(1, Math.round(seconds)))
          : fallback;
        input.value = `${safeSeconds}`;
        return safeSeconds * 1000;

      function randomNextChordDrillLabel(items, currentLabel) {
        const otherItems = items.filter((item) => item.label !== currentLabel);

      }

      function updateChordDrillProgress() {
        if (!chordDrillRunning || exerciseType !== "chord-drill") return;
        const elapsed = Date.now() - chordDrillStartedAt;
        const remainingMs = Math.max(0, chordDrillCurrentDurationMs - elapsed);
        const remainingSeconds = (remainingMs / 1000).toFixed(1);
        const percentageRemaining = chordDrillCurrentDurationMs
          ? (remainingMs / chordDrillCurrentDurationMs) * 100
          : 0;
        progressBarElement.style.width = `${Math.max(0, Math.min(100, percentageRemaining))}%`;
        progressDetailElement.textContent = `${remainingSeconds}s left · ${chordDrillKeyDurationMs() / 1000}s per key`;
        chordDrillNextElement.textContent = `${currentChordDrillLabel} → ${chordDrillNextLabel}`;

      function scheduleChordDrillChord() {

      function makeChordDrillQuestion(nextLabel = "") {

      function vexKeyForPianoDegree(noteName) {
        const octave = /^(C|D|E|F|G)$/i.test(noteName) ? 4 : 3;
        return vexKeyForPianoDegreeAtOctave(noteName, octave);
      }

      function vexKeyForPianoDegreeAtOctave(noteName, octave) {
        return `${noteName.toLowerCase().replace(/b/g, "@").replace(/#/g, "#").replace(/@/g, "b")}/${octave}`;
      }

      function diatonicPosition(letter, octave) {
        return (octave * 7) + NOTE_LETTER_INDEX[letter];
      }

      function parseScaleLetter(noteName) {
        const match = /^([A-G])/.exec(noteName);
        return match ? match[1] : "C";
      }

      function randomStaffPromptNote(noteName) {
        const clef = Math.random() < 0.5 ? "treble" : "bass";
        const range = PIANO_DEGREE_STAFF_RANGES[clef];
        const minPosition = diatonicPosition(range.min.letter, range.min.octave);
        const maxPosition = diatonicPosition(range.max.letter, range.max.octave);
        const letter = parseScaleLetter(noteName);
        const candidates = [];
        for (let octave = 1; octave <= 6; octave += 1) {
          const position = diatonicPosition(letter, octave);
          if (position < minPosition || position > maxPosition) continue;
          candidates.push({
            clef,
            vexKey: vexKeyForPianoDegreeAtOctave(noteName, octave)
          });
        }
        return candidates[randomIndex(candidates.length)] || {
          clef,
          vexKey: vexKeyForPianoDegree(noteName)

      }

      function updatePianoDegreePromptUi() {

          });

            notationCard.classList.add("hidden");
            notationCard.textContent = "VexFlow failed to load";
          }
          return;
        }

        if (promptType === "note-to-degree") {
          degreesElement.classList.add("note-question");
          firstDegreeElement.textContent = displayNote(currentPianoDegree.note);
          return;
        }

        degreesElement.classList.add("note-question");
        firstDegreeElement.textContent = `${currentPianoDegree.degree}`;
      }

      function accidentalOffset(accidentalText) {
        return [...accidentalText].reduce((sum, accidental) => (
          sum + (accidental === "#" ? 1 : accidental === "b" ? -1 : 0)
        ), 0);
      }

      function intervalRootsForQuestion(interval, direction) {
        const preferred = [];
        const fallback = [];
        INTERVAL_ROOTS.forEach((root) => {
          const result = transposedNoteName(root, interval, direction);
          if (!result) return;
          const parsed = parseChordRoot(result);
          if (!parsed) return;
          const accidentalCount = parsed.accidental.length;
          if (accidentalCount <= 1) preferred.push(root);
          else if (accidentalCount <= 2) fallback.push(root);
        });
        return preferred.length ? preferred : fallback;
      }

      function chooseIntervalRoot(interval, direction, previousQuestionId) {
        const roots = intervalRootsForQuestion(interval, direction);
        if (!roots.length) return "C";
        let root = roots[randomIndex(roots.length)];
        let questionId = `interval:${root}:${interval.id}:${direction}`;
        if (questionId === previousQuestionId && roots.length > 1) {
          root = roots[(roots.indexOf(root) + 1) % roots.length];
        }
        return root;
      }

      function basicIntervalLabel(number) {
        const ones = number % 10;
        const tens = number % 100;
        if (tens >= 11 && tens <= 13) return `${number}th`;
        if (ones === 1) return `${number}st`;
        if (ones === 2) return `${number}nd`;
        if (ones === 3) return `${number}rd`;
        return `${number}th`;
      }

      function pickBasicIntervalOption(options) {
        const grouped = new Map();
        options.forEach((option) => {
          if (!grouped.has(option.number)) grouped.set(option.number, []);
          grouped.get(option.number).push(option);
        });
        const numbers = [...grouped.keys()];
        const number = numbers[randomIndex(numbers.length)];
        const variants = grouped.get(number);
        return variants[randomIndex(variants.length)];
      }

      function isNaturalNoteName(noteName) {
        const parsed = parseChordRoot(noteName);
        return Boolean(parsed && !parsed.accidental);
      }

      function naturalAnswersForBasicInterval(rootName, number, direction) {
        return [...new Set(
          intervalOptions
            .filter((option) => selectedIntervalIds.has(option.id) && option.number === number)
            .map((option) => transposedNoteName(rootName, option, direction))
            .filter((noteName) => isNaturalNoteName(noteName))
        )];
      }

      function makeBasicIntervalQuestion(activeIntervals, direction) {
        const intervalNumbers = [...new Set(activeIntervals.map((option) => option.number))];
        const candidates = [];

        intervalNumbers.forEach((number) => {
          NATURAL_INTERVAL_ROOTS.forEach((rootName) => {
            const answers = naturalAnswersForBasicInterval(rootName, number, direction);
            if (!answers.length) return;
            candidates.push({
              id: `interval:basic:${rootName}:${number}:${direction}`,
              root: rootName,
              interval: activeIntervals.find((option) => option.number === number) || activeIntervals[0],
              direction,
              answer: answers[0],
              answers,
              promptLabel: basicIntervalLabel(number)
            });
          });
        });

        if (!candidates.length) {
          const fallbackInterval = pickBasicIntervalOption(activeIntervals);
          const fallbackRoot = chooseIntervalRoot(fallbackInterval, direction, lastQuestionId);
          return buildIntervalQuestion(fallbackRoot, fallbackInterval, direction);
        }

        let question = candidates[randomIndex(candidates.length)];
        if (question.id === lastQuestionId && candidates.length > 1) {
          question = candidates[(candidates.indexOf(question) + 1) % candidates.length];
        }
        return question;
      }

      function parseChordRoot(noteName) {
        const match = /^([A-G])(#{1,2}|b{1,2})?$/.exec(noteName);
        if (!match) return null;
        return { letter: match[1], accidental: match[2] || "" };
      }

      function pitchClassForNoteName(noteName) {
        const parsed = parseChordRoot(noteName);
        if (!parsed) return 0;
        return (CHORD_NATURAL_SEMITONES[parsed.letter] + accidentalOffset(parsed.accidental) + 120) % 12;
      }

      function accidentalTextForOffset(offset) {
        if (offset === -2) return "bb";
        if (offset === -1) return "b";
        if (offset === 1) return "#";
        if (offset === 2) return "##";
        return "";
      }

      function wrappedLetterIndex(index) {
        return ((index % CHORD_LETTERS.length) + CHORD_LETTERS.length) % CHORD_LETTERS.length;
      }

      function transposedNoteName(rootName, interval, direction) {
        const parsedRoot = parseChordRoot(rootName);
        if (!parsedRoot) return null;
        const directionMultiplier = direction === "down" ? -1 : 1;
        const rootIndex = CHORD_LETTERS.indexOf(parsedRoot.letter);
        const targetLetter = CHORD_LETTERS[wrappedLetterIndex(rootIndex + (directionMultiplier * (interval.number - 1)))];
        const desiredPitchClass = (pitchClassForNoteName(rootName) + (directionMultiplier * interval.semitones) + 1200) % 12;
        const naturalPitchClass = CHORD_NATURAL_SEMITONES[targetLetter];
        let accidentalOffsetValue = desiredPitchClass - naturalPitchClass;
        while (accidentalOffsetValue > 6) accidentalOffsetValue -= 12;
        while (accidentalOffsetValue < -6) accidentalOffsetValue += 12;
        if (Math.abs(accidentalOffsetValue) > 2) return null;
        return `${targetLetter}${accidentalTextForOffset(accidentalOffsetValue)}`;
      }

      function buildIntervalQuestion(rootName, interval, direction) {
        const exactAnswer = transposedNoteName(rootName, interval, direction) || rootName;
        const matchingIntervals = intervalPromptStyle === "basic"
          ? intervalOptions.filter((option) => selectedIntervalIds.has(option.id) && option.number === interval.number)
          : [interval];
        const answers = [...new Set(matchingIntervals
          .map((option) => transposedNoteName(rootName, option, direction))
          .filter(Boolean))];
        return {
          id: `interval:${intervalPromptStyle}:${rootName}:${interval.id}:${direction}`,
          root: rootName,
          interval,
          direction,
          answer: exactAnswer,
          answers: answers.length ? answers : [exactAnswer],
          promptLabel: intervalPromptStyle === "basic" ? basicIntervalLabel(interval.number) : interval.label
        };
      }

      function chordToneNames(rootName, intervals) {
        const parsedRoot = parseChordRoot(rootName);
        const rootIndex = CHORD_LETTERS.indexOf(parsedRoot.letter);
        const rootPitchClass = pitchClassForNoteName(rootName);

        return intervals.map((interval, index) => {
          const letter = CHORD_LETTERS[(rootIndex + (index * 2)) % CHORD_LETTERS.length];
          const desiredPitchClass = (rootPitchClass + interval) % 12;
          const naturalPitchClass = CHORD_NATURAL_SEMITONES[letter];
          let accidentalOffsetValue = desiredPitchClass - naturalPitchClass;
          while (accidentalOffsetValue > 6) accidentalOffsetValue -= 12;
          while (accidentalOffsetValue < -6) accidentalOffsetValue += 12;
          return `${letter}${accidentalTextForOffset(accidentalOffsetValue)}`;
        });
      }

      function midiForNoteName(noteName, octave) {
        return ((octave + 1) * 12) + pitchClassForNoteName(noteName);
      }

      function vexKeyForMidi(noteName, midi) {
        const octave = Math.floor(midi / 12) - 1;
        return `${noteName.toLowerCase()}/${octave}`;
      }

      function chordQuestionFromDefinition(root, quality, inversion, clef) {
        const toneNames = chordToneNames(root, quality.intervals);
        const voicedTones = quality.intervals.map((interval, index) => ({
          name: toneNames[index],
          midi: midiForNoteName(root, 3) + interval + (index < inversion ? 12 : 0)
        })).sort((left, right) => left.midi - right.midi);

        const range = chordClefRanges[clef];
        const minMidi = Math.min(...voicedTones.map((tone) => tone.midi));
        const maxMidi = Math.max(...voicedTones.map((tone) => tone.midi));
        const minShift = Math.ceil((range.minMidi - minMidi) / 12);
        const maxShift = Math.floor((range.maxMidi - maxMidi) / 12);
        const shift = maxShift >= minShift ? minShift + randomIndex((maxShift - minShift) + 1) : 0;
        const notes = voicedTones.map((tone) => vexKeyForMidi(tone.name, tone.midi + (shift * 12)));
        const bass = toneNames[inversion];
        const label = chordAnswerLabel(root, quality, inversion);

        return {
          id: `${clef}:${root}:${quality.suffix}:${inversion}:${shift}`,
          label,
          answer: label,
          itemKey: `${root}${quality.suffix}`,
          clef,
          notes
        };
      }

      function chordFlashDuration(curriculum = currentChordCurriculum()) {
        if (!Number.isFinite(curriculum.flashDurationMs)) {
          curriculum.flashDurationMs = CHORD_INITIAL_FLASH_MS;
        }
        return curriculum.flashDurationMs;
      }

      function setChordFlashDuration(nextDurationMs, curriculum = currentChordCurriculum()) {
        curriculum.flashDurationMs = Math.min(
          CHORD_INITIAL_FLASH_MS,
          Math.max(CHORD_MIN_FLASH_MS, nextDurationMs)
        );
      }

      function legacyFlashDurationFromStats(stats) {
        if (!stats || typeof stats !== "object") return null;
        const durations = Object.values(stats)
          .map((itemValue) => Number(itemValue?.flashDurationMs))
          .filter((flashDurationMs) => Number.isFinite(flashDurationMs))
          .map((flashDurationMs) => Math.min(CHORD_INITIAL_FLASH_MS, Math.max(CHORD_MIN_FLASH_MS, flashDurationMs)));
        if (!durations.length) return null;
        return Math.max(...durations);
      }

      function chordStatFor(key) {
        const curriculum = currentChordCurriculum();
        const flashDurationMs = chordFlashDuration(curriculum);
        return { flashDurationMs };
      }

      function saveChordProgress() {
        try {
          chordProgressState.selectedKeyId = selectedChordKeyId;
          localStorage.setItem(CHORD_STORAGE_KEY, JSON.stringify(chordProgressState));
        } catch (error) {
          console.warn("Unable to save chord progress.", error);
        }
      }

      function loadChordProgress() {
        try {
          const saved = localStorage.getItem(CHORD_STORAGE_KEY);
          if (!saved) return;
          const parsed = JSON.parse(saved);
          const savedKeyId = parsed?.selectedKeyId;
          if (chordKeyOptions.some((option) => option.id === savedKeyId)) {
            selectedChordKeyId = savedKeyId;
            chordProgressState.selectedKeyId = savedKeyId;
          }
          if (parsed?.curriculum && typeof parsed.curriculum === "object") {
            const curriculum = chordCurriculumForKey(selectedChordKeyId);
            const stageIndex = Number(parsed.curriculum.stageIndex);
            const unlockedNaturalCount = Number(parsed.curriculum.unlockedNaturalCount);
            const flashDurationMs = Number(parsed.curriculum.flashDurationMs);
            const correctStreak = Number(parsed.curriculum.correctStreak);
            if (Number.isInteger(stageIndex) && stageIndex >= 0 && stageIndex < chordStages.length) {
              curriculum.stageIndex = stageIndex;
            }
            if (Number.isInteger(unlockedNaturalCount)) {
              curriculum.unlockedNaturalCount = Math.min(
                NATURAL_UNLOCK_ORDER.length,
                Math.max(2, unlockedNaturalCount)
              );
            }
            setChordFlashDuration(
              Number.isFinite(flashDurationMs) ? flashDurationMs : CHORD_INITIAL_FLASH_MS,
              curriculum
            );
            curriculum.correctStreak = Number.isInteger(correctStreak) ? Math.max(0, correctStreak) : 0;
            return;
          }
          if (parsed?.byKey && typeof parsed.byKey === "object") {
            Object.entries(parsed.byKey).forEach(([keyId, value]) => {
              if (!value || typeof value !== "object") return;
              if (!chordKeyOptions.some((option) => option.id === keyId)) return;
              const curriculum = chordCurriculumForKey(keyId);
              const stageIndex = Number(value.stageIndex);
              const unlockedNaturalCount = Number(value.unlockedNaturalCount);
              const stats = value.stats;
              const flashDurationMs = Number(value.flashDurationMs);
              const correctStreak = Number(value.correctStreak);
              if (Number.isInteger(stageIndex) && stageIndex >= 0 && stageIndex < chordStages.length) {
                curriculum.stageIndex = stageIndex;
              }
              if (Number.isInteger(unlockedNaturalCount)) {
                curriculum.unlockedNaturalCount = Math.min(
                  NATURAL_UNLOCK_ORDER.length,
                  Math.max(2, unlockedNaturalCount)
                );
              }
              const migratedFlashDurationMs = Number.isFinite(flashDurationMs)
                ? flashDurationMs
                : legacyFlashDurationFromStats(stats);
              setChordFlashDuration(
                Number.isFinite(migratedFlashDurationMs) ? migratedFlashDurationMs : CHORD_INITIAL_FLASH_MS,
                curriculum
              );
              curriculum.correctStreak = Number.isInteger(correctStreak) ? Math.max(0, correctStreak) : 0;
            });
          }
        } catch (error) {
          console.warn("Unable to load chord progress.", error);
        }
      }

      function chordAnswerLabel(root, quality, inversion) {
        const toneNames = chordToneNames(root, quality.intervals);
        const suffix = chordDisplaySuffixMap[quality.suffix] || quality.suffix;
        return inversion ? `${root}${suffix}/${toneNames[inversion]}` : `${root}${suffix}`;
      }

      function chordStatKey(root, quality) {
        return `${root}${quality.suffix}`;
      }

      function chordBaseLabel(root, quality) {
        return chordAnswerLabel(root, quality, 0);
      }

      function makeChordItem(root, qualitySuffix, inversion) {
        const quality = chordQualityBySuffix[qualitySuffix];
        return {
          root,
          quality,
          inversion,
          key: chordAnswerLabel(root, quality, inversion),
          statKey: chordStatKey(root, quality),
          displayKey: chordBaseLabel(root, quality)
        };
      }

      function uniqueChordItemsByStatKey(items) {
        const seen = new Set();
        return items.filter((item) => {
          if (seen.has(item.statKey)) return false;
          seen.add(item.statKey);
          return true;
        });
      }

      function chromaticRootsForChordKey(chordKey) {
        const chromaticRoots = chordKey.accidentalPreference === "flat" ? CHROMATIC_ROOTS_FLAT : CHROMATIC_ROOTS_SHARP;
        return chromaticRoots.filter((root) => !chordKey.scaleNotes.includes(root));
      }

      function unlockedNaturalRoots(curriculum, chordKey) {
        return NATURAL_UNLOCK_ORDER
          .slice(0, curriculum.unlockedNaturalCount)
          .map((index) => ({ root: chordKey.scaleNotes[index], degreeIndex: index }));
      }

      function allNaturalRoots(chordKey) {
        return NATURAL_UNLOCK_ORDER.map((index) => ({ root: chordKey.scaleNotes[index], degreeIndex: index }));
      }

      function stageChordItems(stage, chordKey) {
        const curriculum = currentChordCurriculum();
        const roots = stage.rootGroup === "natural"
          ? (curriculum.stageIndex === 0 ? unlockedNaturalRoots(curriculum, chordKey) : allNaturalRoots(chordKey))
          : chromaticRootsForChordKey(chordKey);
        const qualitySet = stage.rootGroup === "natural"
          ? (stage.chordKind === "triad" ? NATURAL_TRIAD_QUALITIES : NATURAL_SEVENTH_QUALITIES)
          : (stage.chordKind === "triad" ? ACCIDENTAL_TRIAD_QUALITIES : ACCIDENTAL_SEVENTH_QUALITIES);

        if (stage.rootGroup === "natural") {
          return roots.flatMap(({ root, degreeIndex }) => (
            stage.inversions.map((inversion) => makeChordItem(root, qualitySet[degreeIndex], inversion))
          ));
        }

        return roots.flatMap((root) => (
          qualitySet.flatMap((qualitySuffix) => (
            stage.inversions.map((inversion) => makeChordItem(root, qualitySuffix, inversion))
          ))
        ));
      }

      function currentStageChordItems() {
        const curriculum = currentChordCurriculum();
        return stageChordItems(chordStages[curriculum.stageIndex], selectedChordKey());
      }

      function activeChordItems() {
        const curriculum = currentChordCurriculum();
        const chordKey = selectedChordKey();
        return chordStages.slice(0, curriculum.stageIndex + 1)
          .flatMap((stage) => stageChordItems(stage, chordKey));
      }

      function recordChordAttempt(correct) {
        const curriculum = currentChordCurriculum();
        const delta = correct ? -CHORD_FLASH_STEP_MS : CHORD_FLASH_STEP_MS;
        setChordFlashDuration(chordFlashDuration() + delta);
        curriculum.correctStreak = Math.max(0, curriculum.correctStreak + (correct ? 1 : -2));
        saveChordProgress();
      }

      function maybeAdvanceChordCurriculum() {
        const curriculum = currentChordCurriculum();
        if (!curriculum.correctStreak || (curriculum.correctStreak % CHORD_STREAK_FOR_UNLOCK) !== 0) return "";

        let unlockMessage = "";

        if (curriculum.stageIndex === 0 && curriculum.unlockedNaturalCount < NATURAL_UNLOCK_ORDER.length) {
          const unlockPosition = curriculum.unlockedNaturalCount;
          const degreeIndex = NATURAL_UNLOCK_ORDER[unlockPosition];
          const root = selectedChordKey().scaleNotes[degreeIndex];
          curriculum.unlockedNaturalCount += 1;
          unlockMessage = `Unlocked ${NATURAL_UNLOCK_LABELS[unlockPosition]} (${chordBaseLabel(root, chordQualityBySuffix[NATURAL_TRIAD_QUALITIES[degreeIndex]])}).`;
        } else if (curriculum.stageIndex < chordStages.length - 1) {
          curriculum.stageIndex += 1;
          unlockMessage = `Unlocked ${chordStages[curriculum.stageIndex].label.toLowerCase()}.`;
        } else {
          unlockMessage = "All chord levels unlocked.";
        }

        const nextKey = chordKeyOptions.find((option) => option.id === nextChordKeyId()) || chordKeyOptions[0];
        selectedChordKeyId = nextKey.id;
        chordProgressState.selectedKeyId = nextKey.id;
        chordKeySelectElement.value = nextKey.id;
        lastQuestionId = "";
        saveChordProgress();
        return `${unlockMessage} Moved to ${chordKeyLabel(nextKey)}.`;
      }

      function updateProgressDisplay() {
        if (exerciseType === "chord-drill") {
          const key = chordDrillKey();
          progressIndicatorElement.classList.add("visible");
          progressIndicatorElement.setAttribute("aria-hidden", "false");
          progressBarElement.style.width = "0%";
          const chordSeconds = chordDrillChordDurationMs() / 1000;
          const keySeconds = chordDrillKeyDurationMs() / 1000;
          progressDetailElement.textContent = `${chordSeconds}s per chord · ${keySeconds}s per key · circle of ${chordDrillDirectionLabel()} · basic diatonic triads only.`;
          chordDrillNextElement.textContent = chordDrillNextLabel
            ? `${currentChordDrillLabel} → ${chordDrillNextLabel}`
            : "";
          progressChordsElement.innerHTML = chordDrillItemsForKey(key).map((item) => (
            `<div class="progress-chord"><span class="progress-chord-name">${item.label}</span></div>`
          )).join("");
          return;
        }

        if (exerciseType === "chord") {
          const curriculum = currentChordCurriculum();
          const chordKey = selectedChordKey();
          const activeItems = uniqueChordItemsByStatKey(activeChordItems());
          const currentFlashDurationMs = chordFlashDuration(curriculum);
          const streakProgress = curriculum.correctStreak % CHORD_STREAK_FOR_UNLOCK;
          const percent = (streakProgress / CHORD_STREAK_FOR_UNLOCK) * 100;
          const naturalRootsText = unlockedNaturalRoots(curriculum, chordKey).map(({ root }) => root).join(", ");
          progressElement.textContent = `${chordKeyLabel(chordKey)}: ${chordStages[curriculum.stageIndex].label} streak ${streakProgress}/${CHORD_STREAK_FOR_UNLOCK}, timer ${(currentFlashDurationMs / 1000).toFixed(1)}s.`;
          progressIndicatorElement.classList.add("visible");
          progressIndicatorElement.setAttribute("aria-hidden", "false");
          progressBarElement.style.width = `${Math.max(0, Math.min(100, percent))}%`;
          progressDetailElement.textContent = `${curriculum.stageIndex === 0 ? `Natural roots active: ${naturalRootsText}. ` : ""}Every correct answer reduces the shared timer by 0.1s and adds 1 to the streak. Every incorrect answer increases it by 0.1s and subtracts 2 from the streak. Every ${CHORD_STREAK_FOR_UNLOCK} streak points unlocks the next chord step and moves to the next key. Active set: ${activeItems.length} chords.`;
          progressChordsElement.innerHTML = activeItems.map((item) => {
            return `<div class="progress-chord"><span class="progress-chord-name">${item.displayKey}</span><span class="progress-chord-time">${(currentFlashDurationMs / 1000).toFixed(1)}s</span></div>`;
          }).join("");
          return;
        }

        if (exerciseType === "piano-degree") {
          const [tonic] = pianoDegreeKey();
          const percent = (pianoDegreeQuestionsInKey / PIANO_DEGREE_QUESTIONS_PER_KEY) * 100;
          progressElement.textContent = `${displayNote(tonic)} major: question ${pianoDegreeQuestionsInKey + 1}/${PIANO_DEGREE_QUESTIONS_PER_KEY}`;
          progressIndicatorElement.classList.add("visible");
          progressIndicatorElement.setAttribute("aria-hidden", "false");
          progressBarElement.style.width = `${Math.max(0, Math.min(100, percent))}%`;
          progressDetailElement.textContent = `${currentPianoDegree?.promptLabel || "Random prompt type"}. After every ${PIANO_DEGREE_QUESTIONS_PER_KEY} answered questions, the exercise moves to the next major key.`;
          progressChordsElement.innerHTML = "";
          return;
        }

        if (exerciseType !== "chord") {
          progressElement.textContent = "";
          progressDetailElement.textContent = "";
          chordDrillNextElement.textContent = "";
          progressIndicatorElement.classList.remove("visible");
          progressIndicatorElement.setAttribute("aria-hidden", "true");
          progressChordsElement.innerHTML = "";
          return;
        }
      }

      function chooseChordItem() {
        const currentStageKeys = new Set(currentStageChordItems().map((item) => item.statKey));
        const activeItems = activeChordItems();
        const weighted = activeItems.map((item) => {
          const inCurrentStage = currentStageKeys.has(item.statKey);
          const baseWeight = inCurrentStage ? 4 : 1;
          const repeatPenalty = item.statKey === currentChord?.itemKey ? 0.45 : 1;
          return {
            item,
            weight: baseWeight * repeatPenalty
          };
        });

        const totalWeight = weighted.reduce((sum, entry) => sum + entry.weight, 0);
        let threshold = Math.random() * totalWeight;

        for (const entry of weighted) {
          threshold -= entry.weight;
          if (threshold <= 0) return entry.item;
        }

        return weighted[weighted.length - 1].item;
      }

      function showChordQuestion(chord) {
        notationCard.hidden = false;
        notationCard.classList.remove("hidden");
        notationCard.classList.remove("incorrect-reveal");
        notationCard.textContent = "";
        const rendered = window.MusicAppNotation?.drawExerciseChord(notationCard, chord.notes, {
          clef: chord.clef,
          keySignature: selectedChordKey().tonic,
          displayMode: chord.displayMode
        });
        if (!rendered) {
          notationCard.classList.add("hidden");
          notationCard.textContent = "VexFlow failed to load";
          return;
        }
      }

      function revealIncorrectChord(chord) {
        clearTimeout(chordHideTimer);
        notationCard.hidden = false;
        notationCard.classList.remove("hidden");
        notationCard.classList.add("incorrect-reveal");
        notationCard.textContent = "";
        const rendered = window.MusicAppNotation?.drawExerciseChord(notationCard, chord.notes, {
          clef: chord.clef,
          keySignature: selectedChordKey().tonic,
          displayMode: chord.displayMode
        });
        if (!rendered) {
          notationCard.classList.remove("incorrect-reveal");
          notationCard.classList.add("hidden");
          notationCard.textContent = "VexFlow failed to load";
          return;
        }
        scheduleNextQuestion(CHORD_INCORRECT_REVEAL_MS);
      }

      function makeChordQuestion() {
        const clef = nextChordClef;
        nextChordClef = nextChordClef === "treble" ? "bass" : "treble";

        let item = chooseChordItem();
        let question = chordQuestionFromDefinition(item.root, item.quality, item.inversion, clef);
        if (question.id === lastQuestionId) {
          item = chooseChordItem();
          question = chordQuestionFromDefinition(item.root, item.quality, item.inversion, clef);
        }

        question.displayMode = resolvedChordDisplayMode();
        question.id = `${question.id}:${question.displayMode}`;
        lastQuestionId = question.id;
        currentChord = question;
        modeElement.textContent = `${chordKeyLabel(selectedChordKey())} flash chord - ${chordDisplayModeLabel(question.displayMode, clef)}`;
        firstDegreeElement.textContent = "";
        secondDegreeElement.textContent = "";
        connectorElement.hidden = true;
        updateProgressDisplay();
        showChordQuestion(currentChord);
      }

      function normalise(value) {
        return value.trim().replace(/[.\-_]/g, " ").replace(/\s+/g, " ");
      }

      function normaliseNote(value) {
        const note = value.trim()
          .replace(/double\s+sharp/gi, "##")
          .replace(/double\s+flat/gi, "bb")
          .replace(/\bx\b/g, "##")
          .replace(/sharp/gi, "#")
          .replace(/flat/gi, "b")
          .replace(/\u266f/g, "#")
          .replace(/\u266d/g, "b")
          .replace(/\ud834\udd2a/g, "##")
          .replace(/\ud834\udd2b/g, "bb")
          .replace(/\s+/g, "");
        return note.charAt(0).toUpperCase() + note.slice(1).toLowerCase();
      }

      function displayNote(note) {
        return note.replace(/#/g, "\u266f").replace(/b/g, "\u266d");
      }

      function saveIntervalSelection() {
        try {
          localStorage.setItem(INTERVAL_STORAGE_KEY, JSON.stringify([...selectedIntervalIds]));
        } catch (error) {
          console.warn("Unable to save interval selection.", error);
        }
      }

      function loadIntervalSelection() {
        try {
          const saved = localStorage.getItem(INTERVAL_STORAGE_KEY);
          if (!saved) return;
          const parsed = JSON.parse(saved);
          if (!Array.isArray(parsed)) return;
          const validIds = new Set(intervalOptions.map((option) => option.id));
          const selected = parsed.filter((id) => validIds.has(id));
          if (selected.length) {
            selectedIntervalIds = new Set(selected);
          }
        } catch (error) {
          console.warn("Unable to load interval selection.", error);
        }
      }

      function loadIntervalPromptStyle() {
        try {
          const saved = localStorage.getItem(INTERVAL_PROMPT_STYLE_STORAGE_KEY);
          if (saved === "exact" || saved === "basic") {
            intervalPromptStyle = saved;
          }
        } catch (error) {
          console.warn("Unable to load interval prompt style.", error);
        }
      }

      function saveIntervalPromptStyle() {
        try {
          localStorage.setItem(INTERVAL_PROMPT_STYLE_STORAGE_KEY, intervalPromptStyle);
        } catch (error) {
          console.warn("Unable to save interval prompt style.", error);
        }
      }

      function syncIntervalPickerUi() {
        intervalOptionsElement.querySelectorAll("input[type=\"checkbox\"]").forEach((input) => {
          input.checked = selectedIntervalIds.has(input.value);
        });
      }

      function populateIntervalOptions() {
        intervalOptionsElement.innerHTML = intervalOptions.map((option) => (
          `<label class="interval-option"><input type="checkbox" value="${option.id}"> <span>${option.short} - ${option.label}</span></label>`
        )).join("");
        intervalPromptStyleElement.value = intervalPromptStyle;
        syncIntervalPickerUi();
      }

      function setSelectedIntervals(ids) {
        if (!ids.length) return;
        selectedIntervalIds = new Set(ids);
        syncIntervalPickerUi();
        saveIntervalSelection();
        lastQuestionId = "";
        if (exerciseType === "interval") makeQuestion();
      }

      function normaliseSignature(value) {
        return value.trim().toLowerCase()
          .replace(/sharps?|\u266f|#/g, "s")
          .replace(/flats?|\u266d/g, "b")
          .replace(/\s+/g, "");
      }

      function normaliseChord(value) {
        const compact = value.trim()
          .replace(/\u266f/g, "#")
          .replace(/\u266d/g, "b")
          .replace(/\s+/g, "");
        const normaliseChordPart = (part) => part.replace(
          /^([a-g])(#{1,2}|b{1,2}|s{1,2})?(.*)$/i,
          (_, root, accidental = "", quality = "") => {
            const normalisedAccidental = accidental.replace(/s/g, "#");
            const normalisedQuality = quality
              .replace(/^i7b5$/i, "m7b5")
              .replace(/^i7$/i, "m7")
              .replace(/^i$/i, "m")
              .replace(/^m7$/i, "M7")
              .replace(/^m$/i, "M")
              .replace(/^d$/i, "dim");
            return `${root.toUpperCase()}${normalisedAccidental}${normalisedQuality}`;
          }
        );
        const slashIndex = compact.indexOf("/");
        const normalised = slashIndex < 0
          ? normaliseChordPart(compact)
          : `${normaliseChordPart(compact.slice(0, slashIndex))}/${compact.slice(slashIndex + 1)}`;
        if (slashIndex < 0) return normalised;
        const chordPart = normalised.slice(0, slashIndex);
        const bassPart = normalised.slice(slashIndex + 1);
        const bassMatch = /^([a-g])(#{1,2}|b{1,2}|s{1,2})?$/i.exec(bassPart);
        if (!bassMatch) return normalised;
        return `${chordPart}/${bassMatch[1].toUpperCase()}${(bassMatch[2] || "").replace(/s/g, "#")}`;
      }

      function parseChordAnswerParts(value) {
        const normalised = normaliseChord(value);
        const match = /^([A-G](?:#{1,2}|b{1,2})?)([^/]*)?(?:\/([A-G](?:#{1,2}|b{1,2})?))?$/.exec(normalised);
        if (!match) return null;
        return {
          root: match[1] || "",
          quality: match[2] || "",
          bass: match[3] || ""
        };
      }

      function chordImmediateFailure(answer) {
        if (exerciseType !== "chord") return false;
        const guess = parseChordAnswerParts(answer);
        const expected = parseChordAnswerParts(currentChord.answer);
        if (!guess || !expected) return false;
        if (guess.root && !expected.root.startsWith(guess.root)) return true;
        if (guess.quality && !expected.quality.startsWith(guess.quality)) return true;
        if (guess.bass && !expected.bass.startsWith(guess.bass)) return true;
        return false;
      }

      function isCorrect(answer) {
        if (exerciseType === "note") return normaliseNote(answer) === currentNote;
        if (exerciseType === "signature") return normaliseSignature(answer) === currentSignature;
        if (exerciseType === "chord") return normaliseChord(answer) === normaliseChord(currentChord.answer);
        if (exerciseType === "piano-degree") {
          if (currentPianoDegree.promptType === "degree-to-note") {
            return normaliseNote(answer) === currentPianoDegree.note;
          }
          const normalisedAnswer = normalise(answer).toLowerCase();
          return currentPianoDegree.answers.some((accepted) => normalise(accepted).toLowerCase() === normalisedAnswer);
        }
        return currentInterval.answers.includes(normaliseNote(answer));
      }

      function scheduleNextQuestion(delay = 100) {
        clearTimeout(advanceTimer);
        advanceTimer = setTimeout(makeQuestion, delay);
      }

      function populateChordKeyOptions() {
        chordKeySelectElement.innerHTML = chordKeyOptions.map((option) => (
          `<option value="${option.id}">${chordKeyLabel(option)}</option>`
        )).join("");
        chordKeySelectElement.value = selectedChordKeyId;
      }

      function populatePianoDegreeKeyOptions() {
        pianoDegreeKeySelectElement.innerHTML = majorPianoDegreeKeys.map((key, index) => (
          `<option value="${index}">${pianoDegreeKeyLabel(key)}</option>`
        )).join("");
        pianoDegreeKeySelectElement.value = `${pianoDegreeKeyIndex}`;
      }

      function setSelectedChordKey(keyId) {
        if (!chordKeyOptions.some((option) => option.id === keyId)) return;
        selectedChordKeyId = keyId;
        chordProgressState.selectedKeyId = keyId;
        chordKeySelectElement.value = keyId;
        chordCurriculumForKey(keyId);
        saveChordProgress();
        lastQuestionId = "";
        if (exerciseType === "chord") makeQuestion();
      }

      function setSelectedPianoDegreeKey(keyIndexValue) {
        const keyIndex = Number(keyIndexValue);
        if (!Number.isInteger(keyIndex) || keyIndex < 0 || keyIndex >= majorPianoDegreeKeys.length) return;
        pianoDegreeKeyIndex = keyIndex;
        pianoDegreeQuestionsInKey = 0;
        pianoDegreeKeySelectElement.value = `${keyIndex}`;
        lastQuestionId = "";
        if (exerciseType === "piano-degree") makeQuestion();
      }

      function setExerciseType(type) {
        const previousExerciseType = exerciseType;
        if (previousExerciseType === "chord-drill" && type !== "chord-drill") {
          stopChordDrill();
        }
        exerciseType = type;
        const isInterval = type === "interval";
        const isNote = type === "note";
        const isSignature = type === "signature";
        const isChord = type === "chord";
        const isPianoDegree = type === "piano-degree";
        const isChordDrill = type === "chord-drill";

        intervalModeButton.classList.toggle("active", isInterval);
        noteModeButton.classList.toggle("active", isNote);
        signatureModeButton.classList.toggle("active", isSignature);
        chordModeButton.classList.toggle("active", isChord);
        pianoDegreeModeButton.classList.toggle("active", isPianoDegree);
        chordDrillModeButton.classList.toggle("active", isChordDrill);
        intervalModeButton.setAttribute("aria-pressed", isInterval);
        noteModeButton.setAttribute("aria-pressed", isNote);
        signatureModeButton.setAttribute("aria-pressed", isSignature);
        chordModeButton.setAttribute("aria-pressed", isChord);
        pianoDegreeModeButton.setAttribute("aria-pressed", isPianoDegree);
        chordDrillModeButton.setAttribute("aria-pressed", isChordDrill);
        degreesElement.classList.toggle("note-question", !isInterval && !isChord && !isPianoDegree && !isChordDrill);
        degreesElement.classList.toggle("compact-question", isInterval);
        degreesElement.hidden = isChord;
        notationCard.hidden = !isChord && !isPianoDegree;
        notationCard.classList.remove("hidden");
        notationCard.textContent = "";
        chordKeyPickerElement.classList.toggle("visible", isChord);
        pianoDegreeKeyPickerElement.classList.toggle("visible", isPianoDegree);
        chordDrillSettingsElement.classList.toggle("visible", isChordDrill);
        intervalPickerElement.classList.toggle("visible", isInterval);
        answerForm.hidden = isChordDrill;

        if (isInterval) {
          titleElement.textContent = "Interval note targets";
          instructionsElement.textContent = "Each question gives a starting note and an up or down interval. Enter the resulting note.";
          answerLabel.textContent = "Resulting note";
          answerInput.placeholder = "e.g. G# or Bb";
          hintElement.textContent = intervalPromptStyle === "basic"
            ? 'Basic prompt style hides quality and only uses natural-note questions and answers. If multiple selected qualities for that interval number lead to natural notes, any of those natural-note answers is accepted.'
            : 'Use the interval picker to choose which intervals appear. Answers accept accidentals as symbols, "#" and "b", and double accidentals such as "##" or "bb".';
        } else if (isNote) {
          titleElement.textContent = "Scale degree notes";
          instructionsElement.textContent = "Name the note represented by the scale degree and key.";
          answerLabel.textContent = "Note";
          answerInput.placeholder = "e.g. G or F#";
          hintElement.textContent = 'Natural minor is used. Accidentals may be entered as symbols or as "#" and "b".';
        } else if (isSignature) {
          titleElement.textContent = "Key signatures";
          instructionsElement.textContent = "Enter how many sharps or flats the key signature contains.";
          answerLabel.textContent = "Accidentals";
          answerInput.placeholder = "e.g. 4s or 1b";
          hintElement.textContent = 'Use "s" for sharps and "b" for flats. C major and A minor are excluded.';
        } else if (isChord) {
          titleElement.textContent = "Chord flash cards";
          instructionsElement.textContent = "Pick a major key. Natural triads start with I and V, then add ii, vi, iii, vii degrees, and IV, with inversions included from the start. After that come natural sevenths, then accidental triads, then accidental sevenths, each with inversions included. Each correct answer reduces the shared flash timer by 0.1 seconds and adds 1 to your streak; each incorrect answer increases it by 0.1 seconds and subtracts 2 from the streak. Every 10 streak points unlock the next chord step and move to the next key.";
          answerLabel.textContent = "Chord";
          answerInput.placeholder = "e.g. Di, Gm/B, Cm7, Bi7b5/F";
          hintElement.textContent = 'Use "m" for major and "i" for minor. Chords appear randomly as staff notation, arpeggiated staff notation, or a piano keyboard view. Include slash bass notes for inversions. Wrong answers reveal the chord with a red border for 2 seconds before the next card.';
        } else if (isChordDrill) {
          titleElement.textContent = "Chord drill";
          instructionsElement.textContent = `Read the chord symbol before it changes. Chords are selected randomly from the current major key, then the key changes through the circle of ${chordDrillDirectionLabel()}.`;
          answerLabel.textContent = "Chord";
          answerInput.placeholder = "Chord symbol";
          hintElement.textContent = "Basic diatonic triads are used: major, minor, and diminished. Change the durations above while the drill is paused or running.";
        } else {
          titleElement.textContent = "Piano scale degrees";
          instructionsElement.textContent = "Each question randomly uses a piano chart, sheet music, a note prompt, or a scale-degree prompt in the current major key.";
          answerLabel.textContent = "Scale degree";
          answerInput.placeholder = "e.g. 4 or IV";
          hintElement.textContent = 'Question types are chosen randomly. Scale degree answers accept numbers, roman numerals, and names like "tonic" or "dominant". Note answers accept note names such as "G" or "F#". The key changes every 100 answered questions unless you choose a different key.';
        }

        updateProgressDisplay();
        if (isChordDrill && previousExerciseType !== "chord-drill") {
          startChordDrill();
        } else {
          makeQuestion();
        }
      }

      function submitCurrentAnswer() {
        if (answerLocked) return;
        const correct = isCorrect(answerInput.value);
        if (exerciseType === "chord") {
          recordChordAttempt(correct);
        }
        const answerText = exerciseType === "interval"
          ? currentInterval.answers.map((note) => displayNote(note)).join(" or ")
          : exerciseType === "note" ? displayNote(currentNote)
          : exerciseType === "signature" ? currentSignature
          : exerciseType === "piano-degree"
            ? (currentPianoDegree.promptType === "degree-to-note" ? displayNote(currentPianoDegree.note) : `${currentPianoDegree.degree}`)
          : currentChord.label;
        const unlockMessage = correct && exerciseType === "chord" ? maybeAdvanceChordCurriculum() : "";
        feedbackElement.className = `feedback ${correct ? "correct" : "incorrect"}`;
        feedbackElement.textContent = correct
          ? `Correct - ${answerText}.${unlockMessage ? ` ${unlockMessage}` : ""}`
          : `Not quite. The answer is ${answerText}.`;
        if (exerciseType === "piano-degree" && !currentPianoDegree.counted) {
          currentPianoDegree.counted = true;
          pianoDegreeQuestionsInKey += 1;
          if (pianoDegreeQuestionsInKey >= PIANO_DEGREE_QUESTIONS_PER_KEY) {
            pianoDegreeQuestionsInKey = 0;
            pianoDegreeKeyIndex = (pianoDegreeKeyIndex + 1) % majorPianoDegreeKeys.length;
            pianoDegreeKeySelectElement.value = `${pianoDegreeKeyIndex}`;
            lastQuestionId = "";
          }
        }
        updateProgressDisplay();
        if (correct) {
          scheduleNextQuestion();
          return;
        }
        if (exerciseType === "chord") {
          answerLocked = true;
          answerInput.disabled = true;
          revealIncorrectChord(currentChord);
        }
      }

      answerForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitCurrentAnswer();
      });

      answerInput.addEventListener("input", () => {
        if (answerLocked) return;
        clearTimeout(advanceTimer);
        if (exerciseType === "chord" && chordImmediateFailure(answerInput.value)) {
          submitCurrentAnswer();
          return;
        }
        if (isCorrect(answerInput.value)) submitCurrentAnswer();
      });

      intervalModeButton.addEventListener("click", () => setExerciseType("interval"));
      noteModeButton.addEventListener("click", () => setExerciseType("note"));
      signatureModeButton.addEventListener("click", () => setExerciseType("signature"));
      chordModeButton.addEventListener("click", () => setExerciseType("chord"));
      pianoDegreeModeButton.addEventListener("click", () => setExerciseType("piano-degree"));
      chordDrillModeButton.addEventListener("click", () => setExerciseType("chord-drill"));
      chordDrillToggleElement.addEventListener("click", () => {
        if (chordDrillRunning) stopChordDrill();
        else startChordDrill();
      });
      chordDrillChordSecondsElement.addEventListener("change", restartChordDrillTiming);
      chordDrillKeySecondsElement.addEventListener("change", restartChordDrillTiming);
      chordDrillDirectionToggleElement.addEventListener("click", toggleChordDrillDirection);
      chordKeySelectElement.addEventListener("change", (event) => {
        setSelectedChordKey(event.target.value);
      });
      pianoDegreeKeySelectElement.addEventListener("change", (event) => {
        setSelectedPianoDegreeKey(event.target.value);
      });
      intervalOptionsElement.addEventListener("change", (event) => {
        if (event.target.tagName !== "INPUT") return;
        const checkedIds = [...intervalOptionsElement.querySelectorAll("input[type=\"checkbox\"]:checked")].map((input) => input.value);
        if (!checkedIds.length) {
          event.target.checked = true;
          return;
        }
        setSelectedIntervals(checkedIds);
      });
      selectAllIntervalsButton.addEventListener("click", () => {
        setSelectedIntervals(intervalOptions.map((option) => option.id));
      });
      clearIntervalsButton.addEventListener("click", () => {
        setSelectedIntervals(intervalOptions.filter((option) => option.number <= 8).map((option) => option.id));
      });
      intervalPromptStyleElement.addEventListener("change", (event) => {
        intervalPromptStyle = event.target.value === "basic" ? "basic" : "exact";
        saveIntervalPromptStyle();
        lastQuestionId = "";
        if (exerciseType === "interval") setExerciseType("interval");
      });
      nextButton.addEventListener("click", makeQuestion);

      function initializeExercises() {
        loadChordProgress();
        loadIntervalSelection();
        loadIntervalPromptStyle();
        populateChordKeyOptions();
        populatePianoDegreeKeyOptions();
        populateIntervalOptions();
        updateChordDrillDirectionUi();
        const ready = window.MusicAppNotation?.initializeVexFlow
          ? window.MusicAppNotation.initializeVexFlow()
          : Promise.resolve();
        ready.then(() => setExerciseType(exerciseType));
      }

      initializeExercises();
    </script>
  </body>
</html>
