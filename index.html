<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sightline Music Reader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 [&.player-active]:bg-white">
    <main class="app-shell mx-auto max-w-7xl p-6 max-sm:p-3 [body.player-active_&]:max-w-none [body.player-active_&]:p-0">
      <header class="topbar mb-6 flex items-end justify-between gap-6 max-md:flex-col max-md:items-stretch [body.player-active_&]:hidden">
        <div class="midi-panel grid gap-2 sm:grid-cols-[1fr_1fr_auto]">
          <div class="status-pill border border-slate-300 bg-white px-3 py-2 text-center text-sm text-slate-500 [&.connected]:border-green-600 [&.connected]:text-green-700" id="midiStatus">MIDI disconnected</div>
          <select class="border border-slate-300 bg-white px-3 py-2" id="midiInputs" aria-label="MIDI input devices">
            <option value="">No MIDI inputs</option>
          </select>
          <button class="bg-teal-700 px-4 py-2 font-semibold text-white hover:bg-teal-800" id="connectMidi" type="button">Connect MIDI</button>
        </div>
      </header>

      <section class="library-view" id="libraryView" aria-labelledby="libraryTitle">
        <div class="library-header mb-6 flex items-end justify-between gap-4 max-sm:flex-col max-sm:items-stretch">
          <div>
            <h2 class="text-2xl" id="libraryTitle">Music library</h2>
          </div>
          <div>
            <button class="secondary bg-slate-200 px-4 py-2 font-semibold hover:bg-slate-300" id="importScore" type="button">Import MusicXML</button>
            <input id="musicXmlFile" type="file" hidden accept=".xml,.musicxml,application/vnd.recordare.musicxml+xml,application/xml,text/xml">
          </div>
        </div>
        <div class="score-library grid gap-3" id="scoreLibrary"></div>
      </section>

      <section class="player-view border border-slate-200 bg-white p-4 [body.player-active_&]:min-h-screen [body.player-active_&]: [body.player-active_&]:border-0 [body.player-active_&]:p-0" id="playerView" hidden aria-label="Score player">
        <div class="player-toolbar mb-4 flex flex-wrap items-center gap-4 [body.player-active_&]:hidden">
          <button class="secondary bg-slate-200 px-4 py-2 font-semibold hover:bg-slate-300" id="backToLibrary" type="button">← Library</button>
          <div class="player-title min-w-40 flex-1">
            <p class="text-xs font-bold text-slate-500 uppercase" id="pageLabel">Page 1</p>
            <h2 class="text-xl font-bold" id="pieceTitle">Score</h2>
          </div>
          <div class="live-stats flex gap-4 text-xs text-slate-500" aria-label="Current performance statistics">
            <span><strong class="block text-base text-slate-900" id="timerValue">0:00</strong> Time</span>
            <span><strong class="block text-base text-slate-900" id="accuracyValue">—</strong> Accuracy</span>
          </div>
          <div class="feedback bg-slate-100 px-3 py-2 text-center font-semibold text-slate-600 [&.good]:bg-green-700 [&.good]:text-white [&.bad]:bg-red-700 [&.bad]:text-white" id="feedback">Play the highlighted note</div>
        </div>

        <div id="score" class="score relative min-h-80 overflow-x-auto border border-slate-200 bg-white [&_svg]:h-auto [&_svg]:min-w-3xl [&_svg]:w-full [body.player-active_&]:min-h-screen [body.player-active_&]: [body.player-active_&]:border-0" role="img" aria-label="MusicXML score"></div>

        <div class="player-footer mt-3 flex items-center gap-2 max-sm:flex-col max-sm:items-stretch [body.player-active_&]:hidden">
          <button class="secondary bg-slate-200 px-4 py-2 font-semibold hover:bg-slate-300" id="restartPiece" type="button">Restart piece</button>
          <button class="secondary bg-slate-200 px-4 py-2 font-semibold hover:bg-slate-300" id="demoMode" type="button">Use computer keys</button>
          <span class="keyboard-hint text-sm text-slate-500" id="keyboardHint" hidden>Press Space to play the highlighted note or chord.</span>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
