<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sightline Music Reader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">MusicXML practice library</p>
          <h1>Sightline</h1>
        </div>
        <div class="midi-panel">
          <div class="status-pill" id="midiStatus">MIDI disconnected</div>
          <select id="midiInputs" aria-label="MIDI input devices">
            <option value="">No MIDI inputs</option>
          </select>
          <button id="connectMidi" type="button">Connect MIDI</button>
        </div>
      </header>

      <section class="library-view" id="libraryView" aria-labelledby="libraryTitle">
        <div class="library-header">
          <div>
            <p class="eyebrow">Choose a score</p>
            <h2 id="libraryTitle">Music library</h2>
            <p class="library-intro">Select a piece to begin. Results are saved in this browser.</p>
          </div>
          <div>
            <button class="secondary" id="importScore" type="button">Import MusicXML</button>
            <input id="musicXmlFile" type="file" hidden accept=".xml,.musicxml,application/vnd.recordare.musicxml+xml,application/xml,text/xml">
          </div>
        </div>
        <div class="score-library" id="scoreLibrary"></div>
      </section>

      <section class="player-view" id="playerView" hidden aria-label="Score player">
        <div class="player-toolbar">
          <button class="secondary" id="backToLibrary" type="button">← Library</button>
          <div class="player-title">
            <p id="pageLabel">Page 1</p>
            <h2 id="pieceTitle">Score</h2>
          </div>
          <div class="live-stats" aria-label="Current performance statistics">
            <span><strong id="timerValue">0:00</strong> Time</span>
            <span><strong id="accuracyValue">—</strong> Accuracy</span>
          </div>
          <div class="feedback" id="feedback">Play the highlighted note</div>
        </div>

        <div id="score" class="score" role="img" aria-label="MusicXML score"></div>

        <div class="player-footer">
          <button class="secondary" id="restartPiece" type="button">Restart piece</button>
          <button class="secondary" id="demoMode" type="button">Use computer keys</button>
          <span class="keyboard-hint" id="keyboardHint" hidden>Press Space to play the highlighted note or chord.</span>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
