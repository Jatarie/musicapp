<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sightline MIDI Reader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Application controls">
        <div>
          <p class="eyebrow">Sight-reading trainer</p>
          <h1>Sightline MIDI Reader</h1>
        </div>
        <div class="midi-panel">
          <div class="status-pill" id="midiStatus">MIDI disconnected</div>
          <select id="midiInputs" aria-label="MIDI input devices">
            <option value="">No MIDI inputs</option>
          </select>
          <button id="connectMidi" type="button">Connect MIDI</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="controls" aria-label="Exercise settings">
          <div class="control-group">
            <label for="rangeSelect">Range</label>
            <select id="rangeSelect">
              <option value="treble">Treble staff</option>
              <option value="bass">Bass staff</option>
              <option value="grand">Grand staff</option>
            </select>
          </div>

          <div class="control-group">
            <label for="lengthSelect">Notes per round</label>
            <select id="lengthSelect">
              <option value="4">4</option>
              <option value="8">8</option>
              <option value="12" selected>12</option>
            </select>
          </div>

          <div class="control-group">
            <label for="keySelect">Key</label>
            <select id="keySelect">
              <option value="C" selected>C major</option>
              <option value="G">G major</option>
              <option value="D">D major</option>
              <option value="A">A major</option>
              <option value="E">E major</option>
              <option value="B">B major</option>
              <option value="F">F major</option>
              <option value="Bb">B-flat major</option>
              <option value="Eb">E-flat major</option>
              <option value="Ab">A-flat major</option>
              <option value="Db">D-flat major</option>
              <option value="Gb">G-flat major</option>
            </select>
          </div>

          <div class="control-group">
            <label for="keyIntervalSelect">Change key</label>
            <select id="keyIntervalSelect">
              <option value="0" selected>Off</option>
              <option value="1">Every 1 round</option>
              <option value="2">Every 2 rounds</option>
              <option value="5">Every 5 rounds</option>
              <option value="10">Every 10 rounds</option>
            </select>
            <div class="countdown" id="keyCountdown">Key changes off</div>
          </div>

          <div class="control-group">
            <label for="accidentalsSelect">Extra accidentals</label>
            <select id="accidentalsSelect">
              <option value="none">Key notes only</option>
              <option value="some">Add chromatic notes</option>
            </select>
          </div>

          <div class="control-group">
            <label for="distanceSelect">Melodic distance</label>
            <select id="distanceSelect">
              <option value="any">Any distance</option>
              <option value="1">Stepwise</option>
              <option value="2">Up to a skip</option>
              <option value="3" selected>Up to a fourth</option>
              <option value="4">Up to a fifth</option>
              <option value="7">Up to an octave</option>
            </select>
          </div>

          <fieldset class="control-group harmonic-controls">
            <legend>Harmonic notes</legend>
            <div class="toggle-row">
              <input id="harmonicEnabled" type="checkbox">
              <label for="harmonicEnabled">Include intervals/chords</label>
            </div>
            <label for="harmonicDistanceSelect">Maximum interval distance</label>
            <select id="harmonicDistanceSelect">
              <option value="2">Up to a third</option>
              <option value="3">Up to a fourth</option>
              <option value="4" selected>Up to a fifth</option>
              <option value="5">Up to a sixth</option>
              <option value="7">Up to an octave</option>
              <option value="9">Up to a tenth</option>
            </select>
            <label for="harmonicChanceSelect">Chance to appear</label>
            <select id="harmonicChanceSelect">
              <option value="10">10%</option>
              <option value="25" selected>25%</option>
              <option value="50">50%</option>
              <option value="75">75%</option>
              <option value="100">100%</option>
            </select>
            <label for="chordSizeSelect">Notes in chord</label>
            <select id="chordSizeSelect">
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </fieldset>

          <div class="actions">
            <button id="newRound" type="button">New round</button>
            <button id="demoMode" type="button">Use computer keys</button>
          </div>

          <div class="stats" aria-label="Practice statistics">
            <div>
              <span id="scoreValue">0</span>
              <small>Correct</small>
            </div>
            <div>
              <span id="missValue">0</span>
              <small>Missed</small>
            </div>
            <div>
              <span id="streakValue">0</span>
              <small>Streak</small>
            </div>
          </div>
        </aside>

        <section class="score-stage" aria-label="Sheet music exercise">
          <div class="score-header">
            <div>
              <p id="roundLabel">Round 1</p>
              <h2 id="targetLabel">Play the highlighted note</h2>
            </div>
            <div class="feedback" id="feedback">Waiting for input</div>
          </div>
          <div id="score" class="score" role="img" aria-label="Generated sight-reading score"></div>
          <div class="next-round">
            <p id="nextRoundLabel">Next round</p>
            <div id="nextScore" class="score score-preview" role="img" aria-label="Next sight-reading score"></div>
          </div>
          <div class="keyboard-hint" id="keyboardHint" hidden>
            Computer keys: A S D F G H J K map upward through the current exercise.
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
