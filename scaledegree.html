<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scale Degree Interval Trainer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(100%, 38rem);
        padding: clamp(1.5rem, 5vw, 3rem);
        border: 1px solid #e2e8f0;
        background: #fff;
        box-shadow: 0 20px 45px rgb(15 23 42 / 8%);
      }

      h1 { margin: 0; font-size: clamp(1.5rem, 5vw, 2rem); }
      p { color: #475569; }

      .exercise-toggle {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: .25rem;
        margin-top: 1.5rem;
        padding: .25rem;
        background: #e2e8f0;
      }

      .exercise-toggle button { background: transparent; color: #475569; }
      .exercise-toggle button:hover { background: #cbd5e1; }
      .exercise-toggle button.active { background: #fff; color: #0f766e; box-shadow: 0 1px 3px rgb(15 23 42 / 15%); }

      .mode {
        margin: 2.25rem 0 .5rem;
        color: #0f766e;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-align: center;
        text-transform: uppercase;
      }

      .degrees {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        min-height: 8rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.5rem, 14vw, 6rem);
        line-height: 1;
      }

      .degrees.note-question { font-size: clamp(1.75rem, 8vw, 3.5rem); }

      .arrow { color: #94a3b8; font-family: inherit; font-size: .55em; }

      form { margin-top: 2rem; }

      label { display: block; margin-bottom: .5rem; font-weight: 650; }

      .answer-row { display: flex; gap: .75rem; }

      input {
        min-width: 0;
        flex: 1;
        padding: .8rem .9rem;
        border: 1px solid #cbd5e1;
        font: inherit;
      }

      input:focus { outline: 3px solid rgb(13 148 136 / 20%); border-color: #0f766e; }

      button {
        padding: .8rem 1.1rem;
        border: 0;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:hover { background: #115e59; }
      button.secondary { width: 100%; margin-top: .75rem; background: #e2e8f0; color: #0f172a; }
      button.secondary:hover { background: #cbd5e1; }

      .feedback { min-height: 1.5rem; margin: .9rem 0 0; font-weight: 650; }
      .feedback.correct { color: #15803d; }
      .feedback.incorrect { color: #b91c1c; }

      .hint { margin-bottom: 0; font-size: .85rem; }

      @media (max-width: 30rem) {
        .exercise-toggle { grid-template-columns: 1fr; }
        .answer-row { flex-direction: column; }
        .answer-row button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Scale degree intervals</h1>
      <p id="instructions">Name the ascending interval from the first scale degree to the second.</p>

      <div class="exercise-toggle" role="group" aria-label="Exercise type">
        <button class="active" id="intervalMode" type="button" aria-pressed="true">Intervals</button>
        <button id="noteMode" type="button" aria-pressed="false">Name the note</button>
        <button id="signatureMode" type="button" aria-pressed="false">Key signatures</button>
      </div>

      <div class="mode" id="mode"></div>
      <div class="degrees" aria-live="polite">
        <span id="firstDegree"></span>
        <span class="arrow" aria-hidden="true">→</span>
        <span id="secondDegree"></span>
      </div>

      <form id="answerForm" autocomplete="off">
        <label for="answer" id="answerLabel">Interval</label>
        <div class="answer-row">
          <input id="answer" name="answer" placeholder="e.g. major third or M3" required autofocus>
          <button type="submit">Check answer</button>
        </div>
        <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
        <button class="secondary" id="nextQuestion" type="button">New question</button>
      </form>

      <p class="hint" id="hint">Natural minor is used. Answers may be entered as names or shorthand, such as "perfect fifth" or "P5".</p>
    </main>

    <script>
      const scales = {
        major: {
          label: "Major scale",
          degrees: ["I", "ii", "iii", "IV", "V", "vi", "vii°"],
          semitones: [0, 2, 4, 5, 7, 9, 11]
        },
        minor: {
          label: "Natural minor scale",
          degrees: ["i", "ii°", "III", "iv", "v", "VI", "VII"],
          semitones: [0, 2, 3, 5, 7, 8, 10]
        }
      };

      const intervalNames = {
        "1,0": ["perfect unison", "P1"],
        "2,1": ["minor second", "m2"],
        "2,2": ["major second", "M2"],
        "3,3": ["minor third", "m3"],
        "3,4": ["major third", "M3"],
        "4,5": ["perfect fourth", "P4"],
        "4,6": ["augmented fourth", "A4", "tritone"],
        "5,6": ["diminished fifth", "d5", "tritone"],
        "5,7": ["perfect fifth", "P5"],
        "6,8": ["minor sixth", "m6"],
        "6,9": ["major sixth", "M6"],
        "7,10": ["minor seventh", "m7"],
        "7,11": ["major seventh", "M7"],
        "8,12": ["perfect octave", "P8"]
      };

      const keys = {
        major: [
          ["C", ["C", "D", "E", "F", "G", "A", "B"]],
          ["G", ["G", "A", "B", "C", "D", "E", "F#"]],
          ["D", ["D", "E", "F#", "G", "A", "B", "C#"]],
          ["A", ["A", "B", "C#", "D", "E", "F#", "G#"]],
          ["E", ["E", "F#", "G#", "A", "B", "C#", "D#"]],
          ["F", ["F", "G", "A", "Bb", "C", "D", "E"]],
          ["Bb", ["Bb", "C", "D", "Eb", "F", "G", "A"]],
          ["Eb", ["Eb", "F", "G", "Ab", "Bb", "C", "D"]]
        ],
        minor: [
          ["A", ["A", "B", "C", "D", "E", "F", "G"]],
          ["E", ["E", "F#", "G", "A", "B", "C", "D"]],
          ["B", ["B", "C#", "D", "E", "F#", "G", "A"]],
          ["F#", ["F#", "G#", "A", "B", "C#", "D", "E"]],
          ["C#", ["C#", "D#", "E", "F#", "G#", "A", "B"]],
          ["D", ["D", "E", "F", "G", "A", "Bb", "C"]],
          ["G", ["G", "A", "Bb", "C", "D", "Eb", "F"]],
          ["C", ["C", "D", "Eb", "F", "G", "Ab", "Bb"]]
        ]
      };

      const keySignatures = [
        ["G major", "1s"], ["D major", "2s"], ["A major", "3s"],
        ["E major", "4s"], ["B major", "5s"], ["F# major", "6s"],
        ["C# major", "7s"], ["F major", "1b"], ["Bb major", "2b"],
        ["Eb major", "3b"], ["Ab major", "4b"], ["Db major", "5b"],
        ["Gb major", "6b"], ["Cb major", "7b"],
        ["E minor", "1s"], ["B minor", "2s"], ["F# minor", "3s"],
        ["C# minor", "4s"], ["G# minor", "5s"], ["D# minor", "6s"],
        ["A# minor", "7s"], ["D minor", "1b"], ["G minor", "2b"],
        ["C minor", "3b"], ["F minor", "4b"], ["Bb minor", "5b"],
        ["Eb minor", "6b"], ["Ab minor", "7b"]
      ];

      const titleElement = document.querySelector("#title");
      const instructionsElement = document.querySelector("#instructions");
      const modeElement = document.querySelector("#mode");
      const degreesElement = document.querySelector(".degrees");
      const firstDegreeElement = document.querySelector("#firstDegree");
      const secondDegreeElement = document.querySelector("#secondDegree");
      const connectorElement = document.querySelector(".arrow");
      const answerForm = document.querySelector("#answerForm");
      const answerLabel = document.querySelector("#answerLabel");
      const answerInput = document.querySelector("#answer");
      const feedbackElement = document.querySelector("#feedback");
      const nextButton = document.querySelector("#nextQuestion");
      const hintElement = document.querySelector("#hint");
      const intervalModeButton = document.querySelector("#intervalMode");
      const noteModeButton = document.querySelector("#noteMode");
      const signatureModeButton = document.querySelector("#signatureMode");
      let exerciseType = "interval";
      let currentInterval;
      let currentNote;
      let currentSignature;
      let lastQuestionId;
      let advanceTimer;

      function randomIndex(max) {
        return Math.floor(Math.random() * max);
      }

      function makeQuestion() {
        clearTimeout(advanceTimer);
        if (exerciseType === "note") makeNoteQuestion();
        else if (exerciseType === "signature") makeSignatureQuestion();
        else makeIntervalQuestion();
        feedbackElement.textContent = "";
        feedbackElement.className = "feedback";
        answerInput.value = "";
        answerInput.focus();
      }

      function makeIntervalQuestion() {
        const scaleType = Math.random() < .5 ? "major" : "minor";
        const scale = scales[scaleType];
        const first = randomIndex(7);
        let second = randomIndex(6);
        if (second >= first) second += 1;
        let questionId = `interval:${scaleType}:${first}:${second}`;
        if (questionId === lastQuestionId) {
          second = (second + 1) % 7;
          if (second === first) second = (second + 1) % 7;
          questionId = `interval:${scaleType}:${first}:${second}`;
        }
        lastQuestionId = questionId;

        const diatonicNumber = ((second - first + 7) % 7) + 1;
        let semitoneDistance = scale.semitones[second] - scale.semitones[first];
        if (semitoneDistance <= 0) semitoneDistance += 12;

        currentInterval = intervalNames[`${diatonicNumber},${semitoneDistance}`];
        modeElement.textContent = scale.label;
        firstDegreeElement.textContent = scale.degrees[first];
        secondDegreeElement.textContent = scale.degrees[second];
        connectorElement.hidden = false;
        connectorElement.innerHTML = "&rarr;";
      }

      function makeNoteQuestion() {
        const scaleType = Math.random() < .5 ? "major" : "minor";
        const keyIndex = randomIndex(keys[scaleType].length);
        const key = keys[scaleType][keyIndex];
        let degree = randomIndex(6) + 1;
        let questionId = `note:${scaleType}:${keyIndex}:${degree}`;
        if (questionId === lastQuestionId) {
          degree = degree % 6 + 1;
          questionId = `note:${scaleType}:${keyIndex}:${degree}`;
        }
        lastQuestionId = questionId;

        currentNote = key[1][degree];
        modeElement.textContent = "Name the note";
        firstDegreeElement.textContent = scales[scaleType].degrees[degree];
        connectorElement.hidden = false;
        connectorElement.textContent = "of";
        secondDegreeElement.textContent = `${displayNote(key[0])} ${scaleType}`;
      }

      function makeSignatureQuestion() {
        let questionIndex = randomIndex(keySignatures.length);
        if (`signature:${questionIndex}` === lastQuestionId) {
          questionIndex = (questionIndex + 1 + randomIndex(keySignatures.length - 1)) % keySignatures.length;
        }
        lastQuestionId = `signature:${questionIndex}`;
        const question = keySignatures[questionIndex];
        currentSignature = question[1];
        modeElement.textContent = "Key signature";
        firstDegreeElement.textContent = displayNote(question[0]);
        connectorElement.hidden = true;
        secondDegreeElement.textContent = "";
      }

      function normalise(value) {
        return value.trim().replace(/[.\-_]/g, " ").replace(/\s+/g, " ");
      }

      function isCorrect(answer) {
        if (exerciseType === "note") return normaliseNote(answer) === currentNote;
        if (exerciseType === "signature") return normaliseSignature(answer) === currentSignature;
        const trimmed = answer.trim();
        return currentInterval.some((accepted) => {
          if (/^[PMAmd]\d$/.test(accepted)) return trimmed === accepted;
          return normalise(trimmed).toLowerCase() === normalise(accepted).toLowerCase();
        });
      }

      function normaliseNote(value) {
        const note = value.trim()
          .replace(/sharp/gi, "#")
          .replace(/flat/gi, "b")
          .replace(/\u266f/g, "#")
          .replace(/\u266d/g, "b")
          .replace(/\s+/g, "");
        return note.charAt(0).toUpperCase() + note.slice(1).toLowerCase();
      }

      function displayNote(note) {
        return note.replace("#", "\u266f").replace("b", "\u266d");
      }

      function normaliseSignature(value) {
        return value.trim().toLowerCase()
          .replace(/sharps?|\u266f|#/g, "s")
          .replace(/flats?|\u266d/g, "b")
          .replace(/\s+/g, "");
      }

      function scheduleNextQuestion() {
        clearTimeout(advanceTimer);
        advanceTimer = setTimeout(makeQuestion, 100);
      }

      function setExerciseType(type) {
        exerciseType = type;
        const isInterval = type === "interval";
        const isNote = type === "note";
        const isSignature = type === "signature";
        intervalModeButton.classList.toggle("active", isInterval);
        noteModeButton.classList.toggle("active", isNote);
        signatureModeButton.classList.toggle("active", isSignature);
        intervalModeButton.setAttribute("aria-pressed", isInterval);
        noteModeButton.setAttribute("aria-pressed", isNote);
        signatureModeButton.setAttribute("aria-pressed", isSignature);
        degreesElement.classList.toggle("note-question", !isInterval);

        if (isInterval) {
          titleElement.textContent = "Scale degree intervals";
          instructionsElement.textContent = "Name the ascending interval from the first scale degree to the second.";
          answerLabel.textContent = "Interval";
          answerInput.placeholder = "e.g. major third or M3";
          hintElement.textContent = 'Natural minor is used. Answers may be entered as names or shorthand, such as "perfect fifth" or "P5".';
        } else if (isNote) {
          titleElement.textContent = "Scale degree notes";
          instructionsElement.textContent = "Name the note represented by the scale degree and key.";
          answerLabel.textContent = "Note";
          answerInput.placeholder = "e.g. G or F#";
          hintElement.textContent = 'Natural minor is used. Accidentals may be entered as symbols or as "#" and "b".';
        } else {
          titleElement.textContent = "Key signatures";
          instructionsElement.textContent = "Enter how many sharps or flats the key signature contains.";
          answerLabel.textContent = "Accidentals";
          answerInput.placeholder = "e.g. 4s or 1b";
          hintElement.textContent = 'Use "s" for sharps and "b" for flats. C major and A minor are excluded.';
        }
        makeQuestion();
      }

      answerForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const correct = isCorrect(answerInput.value);
        const answerText = exerciseType === "interval"
          ? `${currentInterval[0]} (${currentInterval[1]})`
          : exerciseType === "note" ? displayNote(currentNote) : currentSignature;
        feedbackElement.className = `feedback ${correct ? "correct" : "incorrect"}`;
        feedbackElement.textContent = correct
          ? `Correct — ${answerText}.`
          : `Not quite. The answer is ${answerText}.`;
        if (correct) scheduleNextQuestion();
      });

      answerInput.addEventListener("input", () => {
        clearTimeout(advanceTimer);
        if (isCorrect(answerInput.value)) scheduleNextQuestion();
      });

      intervalModeButton.addEventListener("click", () => setExerciseType("interval"));
      noteModeButton.addEventListener("click", () => setExerciseType("note"));
      signatureModeButton.addEventListener("click", () => setExerciseType("signature"));
      nextButton.addEventListener("click", makeQuestion);
      makeQuestion();
    </script>
  </body>
</html>
